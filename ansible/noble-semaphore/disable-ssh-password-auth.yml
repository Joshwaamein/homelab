---
# disable-ssh-password-auth.yml
#
# Companion to secure_ssh_configuration.yml. That play sets
# PasswordAuthentication in the MAIN sshd_config, but on Ubuntu cloud-init
# images a drop-in at /etc/ssh/sshd_config.d/50-cloud-init.conf ships
# `PasswordAuthentication yes` and OVERRIDES the main config. sshd uses
# FIRST-match-wins for PasswordAuthentication and the Include line sits near
# the top of sshd_config, so the cloud-init file (read alphabetically before
# anything higher-numbered) wins. Net effect: password auth can still be
# effectively enabled even though the main config says `no`.
#
# Fix: drop a LOW-numbered include (01-) that asserts key-only auth. It sorts
# BEFORE 50-cloud-init.conf, so first-match-wins resolves to `no`. It also
# survives a cloud-init rewrite of the 50- file. (A 99- drop-in does NOT
# work: it loads after 50- and is ignored.)
#
# Targets inventory GROUPS, never hostnames/IPs (repo opsec convention).
# Hypervisors are intentionally excluded: they are Debian, carry no
# cloud-init drop-in, and are already key-only. A guard refuses to run on
# any host that exposes /usr/bin/pveversion (i.e. a PVE host) as a backstop.
#
# Safety:
#  - validate: sshd -t -f %s rejects a bad file before it is written.
#  - reload (not restart) preserves live sessions.
#  - pre_task asserts an authorized_keys file exists before locking out.
#
# Recommended run order:
#   ansible-playbook -i inventory disable-ssh-password-auth.yml --check --diff
#   ansible-playbook -i inventory disable-ssh-password-auth.yml --limit <one-host> --diff
#   ansible-playbook -i inventory disable-ssh-password-auth.yml --diff

- name: Disable SSH password auth (cloud-init drop-in override)
  hosts: ubuntu_vms
  gather_facts: true
  become: true
  ignore_unreachable: true
  tags: ssh, hardening

  pre_tasks:
    - name: Backstop - never run against a Proxmox VE host
      ansible.builtin.stat:
        path: /usr/bin/pveversion
      register: pve_marker

    - name: Refuse on PVE hosts (out of scope, already key-only)
      ansible.builtin.assert:
        that:
          - not pve_marker.stat.exists
        fail_msg: "REFUSING: {{ ansible_hostname }} looks like a PVE host; out of scope."
        quiet: true

    - name: Verify an authorized_keys file exists before disabling passwords
      ansible.builtin.stat:
        path: /root/.ssh/authorized_keys
      register: root_keys

    - name: Assert SSH keys are present (do not lock out)
      ansible.builtin.assert:
        that:
          - root_keys.stat.exists
        fail_msg: "CRITICAL: no /root/.ssh/authorized_keys on {{ ansible_hostname }}; add keys first."
        success_msg: "SSH keys present; safe to enforce key-only auth."

  tasks:
    - name: Drop in 01-disable-password-auth.conf (validated)
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/01-disable-password-auth.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by Ansible: enforce key-only SSH.
          # Sorts BEFORE 50-cloud-init.conf; sshd is first-match-wins.
          PasswordAuthentication no
          KbdInteractiveAuthentication no
        validate: "/usr/sbin/sshd -t -f %s"
      notify: reload ssh

    - name: Confirm effective passwordauthentication is off
      ansible.builtin.command: /usr/sbin/sshd -T
      changed_when: false
      register: sshd_effective

    - name: Assert password auth is disabled
      ansible.builtin.assert:
        that:
          - "'passwordauthentication no' in sshd_effective.stdout | lower"
        fail_msg: "password auth STILL enabled on {{ ansible_hostname }} after drop-in"
        success_msg: "password auth confirmed off on {{ ansible_hostname }}"

  handlers:
    - name: reload ssh
      ansible.builtin.service:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: reloaded
