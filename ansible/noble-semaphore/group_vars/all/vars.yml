---
# /opt/ansible/noble-semaphore/group_vars/all/vars.yml
# Non-secret variables for unattended-upgrades configuration
# Secrets (SMTP key) are in group_vars/all/vault.yml (not committed to git)

# Email configuration
unattended_upgrades_email: "unattended-upgrades@baggerzzz.online"
unattended_upgrades_mail_report: "on-change"
unattended_upgrades_smtp_host: "smtp-relay.brevo.com"
unattended_upgrades_smtp_port: 587
unattended_upgrades_smtp_user: "joshuamein@googlemail.com"
unattended_upgrades_smtp_from: "unattended-upgrades@baggerzzz.online"
unattended_upgrades_mailname: "baggerzzz.online"

# VM schedule (all hosts except proxmox group)
unattended_upgrades_vm_upgrade_time: "05:00:00"
unattended_upgrades_vm_reboot_time: "05:30"
unattended_upgrades_vm_update_time: "04:00:00"

# Proxmox host schedule (runs AFTER VMs reboot)
unattended_upgrades_pve_upgrade_time: "06:00:00"
unattended_upgrades_pve_reboot_time: "06:30"
unattended_upgrades_pve_update_time: "05:00:00"
